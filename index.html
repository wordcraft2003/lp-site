<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>絵が戦略になる｜LPデザイン</title>
  <meta name="description" content="伝わらない想いを、伝わる価値へ。見る人の心を動かし、選ばれる理由をつくるLPデザイン。">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --indigo: #102844;
      --indigo-soft: #233f5f;
      --vermilion: #b74432;
      --vermilion-dark: #983426;
      --washi: #f7f0e4;
      --washi-light: #fffaf1;
      --gold: #b99752;
      --text: #162437;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(185,151,82,.16), transparent 34%),
        linear-gradient(180deg, var(--washi-light), var(--washi));
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
      line-height: 1.8;
    }

    a {
      text-decoration: none;
    }

    .lp-wrapper {
      overflow: hidden;
    }

    .lp-section {
      position: relative;
      background: var(--washi-light);
    }

    .lp-section + .lp-section {
      border-top: 1px solid rgba(185,151,82,.28);
    }

    .lp-image-wrap {
      position: relative;
      margin: 0 auto;
      background: var(--washi-light);
    }

    .lp-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .cta-area {
      padding: 3rem 1rem 4rem;
      background:
        linear-gradient(180deg, rgba(255,250,241,.95), rgba(247,240,228,.98));
      text-align: center;
    }

    .cta-copy {
      max-width: 760px;
      margin: 0 auto 1.5rem;
      color: var(--indigo);
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      font-weight: 600;
      letter-spacing: .04em;
    }

    .btn-vermilion {
      --bs-btn-color: #fff;
      --bs-btn-bg: var(--vermilion);
      --bs-btn-border-color: var(--vermilion);
      --bs-btn-hover-color: #fff;
      --bs-btn-hover-bg: var(--vermilion-dark);
      --bs-btn-hover-border-color: var(--vermilion-dark);
      --bs-btn-focus-shadow-rgb: 183, 68, 50;
      min-width: 240px;
      border-radius: 999px;
      padding: .95rem 2rem;
      font-weight: 700;
      letter-spacing: .08em;
      box-shadow: 0 10px 24px rgba(183,68,50,.22);
    }

    .btn-outline-gold {
      --bs-btn-color: var(--indigo);
      --bs-btn-border-color: var(--gold);
      --bs-btn-hover-color: #fff;
      --bs-btn-hover-bg: var(--gold);
      --bs-btn-hover-border-color: var(--gold);
      min-width: 200px;
      border-radius: 999px;
      padding: .95rem 2rem;
      font-weight: 700;
      letter-spacing: .08em;
      background: rgba(255,250,241,.72);
    }

    .floating-cta {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 1030;
      display: none;
    }

    .floating-cta .btn {
      border-radius: 999px;
      padding: .8rem 1.3rem;
      font-size: .95rem;
      box-shadow: 0 8px 22px rgba(0,0,0,.18);
    }

    .section-label {
      position: absolute;
      left: 1rem;
      top: 1rem;
      z-index: 2;
      padding: .25rem .7rem;
      border: 1px solid rgba(185,151,82,.45);
      border-radius: 999px;
      background: rgba(255,250,241,.78);
      color: var(--indigo-soft);
      font-size: .8rem;
      letter-spacing: .08em;
      backdrop-filter: blur(6px);
    }

    .note-box {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem;
      border: 1px solid rgba(185,151,82,.35);
      border-radius: 1rem;
      background: rgba(255,250,241,.75);
      color: var(--indigo-soft);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: .95rem;
    }

    .footer-mini {
      padding: 1.5rem 1rem;
      color: rgba(16,40,68,.78);
      background: var(--washi);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: .9rem;
      text-align: center;
    }

    @media (min-width: 768px) {
      .floating-cta {
        display: block;
      }
    }

    @media (max-width: 575.98px) {
      .section-label {
        font-size: .72rem;
      }

      .cta-area {
        padding: 2.2rem 1rem 3rem;
      }

      .btn-vermilion,
      .btn-outline-gold {
        width: 100%;
      }
    }
    
  </style>
</head>

<body>
  <div class="lp-wrapper">

    <!-- 固定CTA：不要ならこのdivごと削除してください -->
    <div class="floating-cta">
      <a href="#contact" class="btn btn-vermilion">無料で相談する</a>
    </div>

    <!-- 1枚目：TOP画像 -->
    <section id="top" class="lp-section" aria-label="絵が戦略になる">
      <span class="section-label">01 TOP</span>
      <div class="lp-image-wrap">
        <picture>
          <!-- スマホ用画像を別で作る場合は、下のsrcsetを差し替えてください -->
          <!-- <source media="(max-width: 767.98px)" srcset="../assets/img/lp/01-top-sm.png"> -->
          <img src="assets/img/lp/01-top.png" class="lp-image" alt="絵が戦略になる。伝わらない想いを、伝わる価値へ。見る人の心を動かし、選ばれる理由をつくるLPデザイン。" loading="eager">
        </picture>
      </div>
    </section>

    <!-- 2枚目：こんなお悩みはありませんか？ -->
    <section id="problem" class="lp-section" aria-label="こんなお悩みはありませんか">
      <span class="section-label">02 お悩み</span>
      <div class="lp-image-wrap">
        <img src="assets/img/lp/02-problem.png" class="lp-image" alt="こんなお悩みはありませんか。言葉では魅力が伝わらない、サービスの違いが伝わらない、LPを作っても反応が弱い、自分の想いをうまく形にできない。" loading="lazy">
      </div>
    </section>

    <!-- 3枚目：その悩み、絵の力で変わります -->
    <section id="solution" class="lp-section" aria-label="その悩み、絵の力で変わります">
      <span class="section-label">03 解決策</span>
      <div class="lp-image-wrap">
        <img src="assets/img/lp/03-solution.png" class="lp-image" alt="その悩み、絵の力で変わります。イラスト・構成・デザインを戦略的に組み合わせ、情報を整理し、感情を動かし、行動につなげます。" loading="lazy">
      </div>
    </section>

    <!-- 4枚目：絵がもたらす3つの効果 -->
    <section id="benefit" class="lp-section" aria-label="絵がもたらす3つの効果">
      <span class="section-label">04 効果</span>
      <div class="lp-image-wrap">
        <img src="assets/img/lp/04-benefit.png" class="lp-image" alt="絵がもたらす3つの効果。一瞬で伝わる、感情が動く、選ばれる理由が残る。" loading="lazy">
      </div>
    </section>

    <!-- 5枚目：制作の流れ -->
    <section id="flow" class="lp-section" aria-label="制作の流れ">
      <span class="section-label">05 制作の流れ</span>
      <div class="lp-image-wrap">
        <img src="assets/img/lp/05-flow.png" class="lp-image" alt="制作の流れ。ヒアリング、戦略設計、ビジュアル制作、公開・改善。" loading="lazy">
      </div>
    </section>

    <!-- 6枚目：お客様の声 -->
    <section id="voice" class="lp-section" aria-label="お客様の声">
      <span class="section-label">06 お客様の声</span>
      <div class="lp-image-wrap">
        <img src="assets/img/lp/06-voice.png" class="lp-image" alt="お客様の声。想いを形にしてもらい、初めて価値が伝わるLPになりました。" loading="lazy">
      </div>
    </section>

    <!-- 7枚目：フッターCTA -->
    <section id="contact" class="lp-section" aria-label="あなたの想いを、伝わる戦略に">
      <span class="section-label">07 CTA</span>
      <div class="lp-image-wrap">
        <img src="assets/img/lp/07-footer.png" class="lp-image" alt="あなたの想いを、伝わる戦略に。絵の力で、あなたのビジネスの未来をもっと輝かせましょう。今すぐ相談する。" loading="lazy">
      </div>
    </section>

    <!-- 画像のボタンはクリックできないため、HTML側にもCTAを置いています -->
    <div class="cta-area">
      <p class="cta-copy">画像内のボタンは装飾です。実際の申込み導線として、こちらのボタンをGoogleフォームやお問い合わせページにリンクしてください。</p>
      <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
        <a href="https://forms.gle/ここにGoogleフォームURL" class="btn btn-vermilion btn-lg" target="_blank" rel="noopener">無料で相談する</a>
        <a href="#flow" class="btn btn-outline-gold btn-lg">制作の流れを見る</a>
      </div>
    </div>

    <footer class="footer-mini">
      <small>&copy; Word Craft. All Rights Reserved.</small>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
